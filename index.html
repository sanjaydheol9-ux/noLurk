<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nolurk. — AI Urban Mobility Auditor</title>
    <meta name="description" content="nolurk. is a premium AI-powered urban mobility auditor that scans spatial coordinates for safety anomalies and recommends the safest routes.">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FAF8F5',
                        'deep-brown': '#2F1A0A',
                        sage: '#72A08A',
                        'sage-light': '#E8F0EB',
                        'sage-dark': '#5A8A72',
                        terracotta: '#C17B5C',
                        'terracotta-light': '#F5E8E0',
                        'terracotta-dark': '#A8654A',
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'Georgia', 'serif'],
                        body: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    borderRadius: {
                        '3xl': '24px',
                    }
                }
            }
        }
    </script>

    <style>
        /* ═══════════════════════════════════════════
           DESIGN SYSTEM — nolurk.
           Apple Minimalism + Luxury Typography
        ═══════════════════════════════════════════ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #FAF8F5;
            color: #2F1A0A;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── STATE TRANSITIONS ── */
        .state-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                        visibility 0.8s;
            will-change: opacity, transform;
        }

        .state-container.hidden-state {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.98);
        }

        .state-container.active-state {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            transform: scale(1);
        }

        /* ── GLASSMORPHISM ── */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* ── LOGO ── */
        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .logo-dot {
            color: #72A08A;
        }

        /* ── SEARCH BAR ── */
        .search-pill {
            transition: box-shadow 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                        border-color 0.4s;
        }

        .search-pill:focus-within {
            box-shadow: 0 0 0 4px rgba(114, 160, 138, 0.15),
                        0 20px 60px -12px rgba(47, 26, 10, 0.12);
            transform: translateY(-2px);
            border-color: #72A08A;
        }

        .search-pill input {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .search-pill input::placeholder {
            color: rgba(47, 26, 10, 0.35);
        }

        .scan-btn {
            background: #2F1A0A;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .scan-btn:hover {
            background: #72A08A;
            transform: scale(1.02);
            box-shadow: 0 8px 30px -6px rgba(114, 160, 138, 0.4);
        }

        .scan-btn:active {
            transform: scale(0.98);
        }

        /* ── PULSING RING LOADER ── */
        .pulse-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
        }

        .pulse-ring::before,
        .pulse-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2.5px solid #72A08A;
        }

        .pulse-ring::before {
            animation: pulseRing 2s cubic-bezier(0.22, 1, 0.36, 1) infinite;
        }

        .pulse-ring::after {
            animation: pulseRing 2s cubic-bezier(0.22, 1, 0.36, 1) 0.6s infinite;
        }

        @keyframes pulseRing {
            0% {
                transform: scale(0.6);
                opacity: 1;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .pulse-ring-inner {
            position: absolute;
            inset: 24px;
            border-radius: 50%;
            background: #72A08A;
            opacity: 0.2;
            animation: pulseCore 2s ease-in-out infinite;
        }

        @keyframes pulseCore {
            0%, 100% { transform: scale(0.9); opacity: 0.15; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        /* ── MAP BACKGROUND ── */
        .map-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1280&q=80');
            background-size: cover;
            background-position: center;
            filter: sepia(0.35) contrast(0.9) brightness(1.05);
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .map-bg.visible {
            opacity: 1;
        }

        .map-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-color: #FAF8F5;
            opacity: 0.4;
            mix-blend-mode: multiply;
            pointer-events: none;
            transition: opacity 1.2s;
        }

        .map-overlay.hidden {
            opacity: 0;
        }

        /* ── RESULT CARDS ── */
        .result-card {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .result-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 64px -16px rgba(47, 26, 10, 0.12);
        }

        .tag-safe {
            background: rgba(114, 160, 138, 0.12);
            color: #5A8A72;
            border: 1px solid rgba(114, 160, 138, 0.2);
        }

        .tag-warning {
            background: rgba(193, 123, 92, 0.12);
            color: #A8654A;
            border: 1px solid rgba(193, 123, 92, 0.2);
        }

        .indicator-safe {
            background: linear-gradient(135deg, #72A08A, #5A8A72);
        }

        .indicator-warning {
            background: linear-gradient(135deg, #C17B5C, #A8654A);
        }

        /* ── SCROLLBAR ── */
        .results-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .results-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-scroll::-webkit-scrollbar-thumb {
            background: rgba(47, 26, 10, 0.15);
            border-radius: 3px;
        }

        .results-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(47, 26, 10, 0.3);
        }

        /* ── AMBIENT GRADIENT ── */
        .ambient-gradient {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(114, 160, 138, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(193, 123, 92, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: ambientDrift 20s ease-in-out infinite alternate;
        }

        @keyframes ambientDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-3%, 2%) rotate(2deg); }
        }

        /* ── BACK BUTTON ── */
        .back-btn {
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .back-btn:hover {
            background: rgba(47, 26, 10, 0.06);
            transform: translateX(-2px);
        }

        /* ── SUBTITLE TYPING SHIMMER ── */
        .shimmer-text {
            background: linear-gradient(90deg, #2F1A0A 0%, #72A08A 50%, #2F1A0A 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ── STAGGER UTILITY ── */
        .stagger-1 { transition-delay: 0.05s; }
        .stagger-2 { transition-delay: 0.12s; }
        .stagger-3 { transition-delay: 0.19s; }
        .stagger-4 { transition-delay: 0.26s; }
        .stagger-5 { transition-delay: 0.33s; }
        .stagger-6 { transition-delay: 0.40s; }
        .stagger-7 { transition-delay: 0.47s; }
        .stagger-8 { transition-delay: 0.54s; }

        /* ── FLOATING BADGE ── */
        .floating-badge {
            animation: floatBadge 6s ease-in-out infinite;
        }

        @keyframes floatBadge {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* ── INTERACTIVE CURSOR GLOW ── */
        #cursorGlow {
            position: fixed;
            top: 0; left: 0;
            width: 600px; height: 600px;
            background: radial-gradient(circle closest-side, rgba(114, 160, 138, 0.08), transparent);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: width 0.3s, height 0.3s;
        }

        /* ── ERROR STATE ── */
        .error-shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
    </style>
</head>
<body class="bg-cream min-h-screen selection:bg-sage/20 selection:text-deep-brown">

    <!-- Interactive Cursor Glow -->

    <!-- Ambient Background Gradient -->
    <div class="ambient-gradient" id="ambientGradient"></div>

    <!-- Map Background (Results State) -->
    <div class="map-bg" id="mapBg"></div>
    <div class="map-overlay hidden" id="mapOverlay"></div>

    <!-- ╔════════════════════════════════════════╗
         ║   STATE 1 — LANDING                    ║
         ╚════════════════════════════════════════╝ -->
    <div id="stateLanding" class="state-container active-state flex-col">
        <div class="relative z-10 w-full max-w-2xl mx-auto px-6">
            
            <!-- AI Badge -->

                <div class="floating-badge glass inline-flex items-center gap-2.5 px-5 py-2.5 rounded-full">

            <h1 class="logo-text text-center text-[5.5rem] md:text-[8rem] lg:text-[10rem] text-deep-brown mb-8 leading-none tracking-tighter drop-shadow-sm" aria-label="nolurk - AI Urban Mobility Auditor">
                nolurk<span class="logo-dot">.</span>
            </h1>

            <!-- Tagline -->
            <p class="font-body text-center text-deep-brown/40 text-xl font-light tracking-widest mb-20 max-w-lg mx-auto leading-relaxed">

                <!-- Location Pin Icon -->
                <div class="pl-3 flex-shrink-0">

            <!-- Footer Badges -->

    <!-- ╔════════════════════════════════════════╗
         ║   STATE 2 — AUDITING (LOADER)          ║
         ╚════════════════════════════════════════╝ -->
    <div id="stateAuditing" class="state-container hidden-state flex-col">
        <div class="relative z-10 text-center">
            <!-- Pulse Ring -->
            <div class="pulse-ring mx-auto mb-14">
                <div class="pulse-ring-inner"></div>
            </div>

            <!-- Status Text -->
            <h2 class="logo-text text-4xl md:text-5xl text-deep-brown mb-5 drop-shadow-sm">
                nolurk<span class="logo-dot">.</span> <span class="font-body text-3xl md:text-4xl font-light text-deep-brown/60 ml-2">auditor active</span>
            </h2>
            <p class="font-body text-base md:text-lg tracking-widest text-deep-brown/35 font-light shimmer-text">
                Scanning spatial coordinates for safety anomalies...

            <!-- Progress Dots -->
            <div class="flex justify-center gap-2 mt-10">

                <div class="w-1.5 h-1.5 rounded-full bg-sage/40 animate-pulse" style="animation-delay: 0.3s;"></div>

    <!-- ╔════════════════════════════════════════╗
         ║   STATE 3 — RESULTS                    ║
         ╚════════════════════════════════════════╝ -->

        <div class="relative z-10 w-full h-full flex flex-col">
            
            <!-- Top Bar -->
            <header class="flex items-center justify-between px-6 md:px-10 pt-8 pb-4">

                <div class="logo-text text-2xl text-deep-brown/80">
                    nolurk<span class="logo-dot">.</span>
                </div>
                <div id="resultsMeta" class="font-body text-xs text-deep-brown/30 tracking-wide">

                    <svg class="w-3.5 h-3.5 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>

            <!-- Results Container -->

                <div id="summaryBar" class="glass-strong rounded-3xl px-8 py-6 mb-6 flex items-center justify-between">
                    <div>
                        <h3 class="font-display text-xl text-deep-brown font-semibold mb-1">Audit Complete</h3>

                            <!-- Dynamic summary -->

    <script>
        // ═══════════════════════════════════════════
        //   nolurk. — Core Engine
        // ═══════════════════════════════════════════

        const API_URL = 'http://127.0.0.1:5000/evaluate_routes';
        const CONFIG_URL = 'http://127.0.0.1:5000/config';

        // State references
        const stateLanding  = document.getElementById('stateLanding');
        const stateAuditing = document.getElementById('stateAuditing');
        const stateResults  = document.getElementById('stateResults');
        const searchInput   = document.getElementById('searchInput');
        const searchPill    = document.getElementById('searchPill');
        const errorMsg      = document.getElementById('errorMsg');
        const mapBg         = document.getElementById('mapBg');
        const mapOverlay    = document.getElementById('mapOverlay');
        const mapContainer  = document.getElementById('map');
        const resultsGrid   = document.getElementById('resultsGrid');
        const queryDisplay  = document.getElementById('queryDisplay');
        const resultsMeta   = document.getElementById('resultsMeta');
        const summaryText   = document.getElementById('summaryText');
        const safetyScore   = document.getElementById('safetyScore');
        const summaryBar    = document.getElementById('summaryBar');

        // Google Maps
        let googleMap = null;
        let googleMapsApiKey = null;

        // ── LOAD GOOGLE MAPS CONFIG ──
        async function loadGoogleMapsConfig() {
            try {
                const response = await fetch(CONFIG_URL);
                const config = await response.json();
                googleMapsApiKey = config.google_maps_api_key;
                if (googleMapsApiKey) {
                    loadGoogleMapsScript();
                }
            } catch (err) {
                console.warn('Maps config unavailable');
            }
        }

        // ── LOAD GOOGLE MAPS SCRIPT ──
        function loadGoogleMapsScript() {
            try {
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${googleMapsApiKey}`;
                script.async = true;
                script.onload = () => { console.log('Maps SDK loaded'); };
                script.onerror = () => { console.log('Maps SDK failed (optional)'); };
                document.head.appendChild(script);
            } catch (err) {
                console.warn('Maps loading error:', err);
            }
        }

        // ── INITIALIZE MAP (OPTIONAL) ──
        function initMap() {
            try {
                if (!window.google || !window.google.maps || !mapContainer) return;
                
                googleMap = new google.maps.Map(mapContainer, {
                    zoom: 14,
                    center: { lat: 12.9716, lng: 77.5946 }
                });
                mapContainer.style.display = 'block';
            } catch (err) {
                console.log('Map init optional feature failed');
                mapContainer.style.display = 'none';
            }
        }

        // ── DISPLAY LOCATION ON MAP (OPTIONAL) ──
        function displayLocationOnMap(query) {
            try {
                if (!window.google || !window.google.maps || !googleMap) return;
                
                const geocoder = new google.maps.Geocoder();
                geocoder.geocode({ address: query }, (results, status) => {
                    if (status === 'OK' && results[0]) {
                        const loc = results[0].geometry.location;
                        googleMap.setCenter(loc);
                        googleMap.setZoom(15);
                        new google.maps.Marker({ map: googleMap, position: loc, title: query });
                    }
                });
            } catch (err) {
                console.log('Location display optional feature failed');
            }
        }

        // ── DISPLAY LOCATION ON MAP ──
        function displayLocationOnMap(query) {
            console.log('displayLocationOnMap called with query:', query);
            console.log('googleMap:', googleMap, 'geocoder:', geocoder);
            
            if (!googleMap || !geocoder) {
                console.warn('Map or Geocoder not initialized, will retry');
                return;
            }
            
            try {
                console.log('Geocoding address:', query);
                geocoder.geocode({ address: query }, (results, status) => {
                    console.log('Geocode result status:', status, 'results count:', results?.length);
                    if (status === 'OK' && results[0]) {
                        const location = results[0].geometry.location;
                        console.log('Location found:', location.lat(), location.lng());
                        googleMap.setCenter(location);
                        googleMap.setZoom(15);
                        
                        new google.maps.Marker({
                            map: googleMap,
                            position: location,
                            title: query,
                            icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                        });
                    } else {
                        console.warn('Geocoding status:', status, 'results:', results);
                    }
                });
            } catch (err) {
                console.error('Error displaying location on map:', err);
            }
        }

        // Allow Enter key to trigger scan
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startAudit();
        });

        // Load Google Maps on page load
        window.addEventListener('load', () => {
            loadGoogleMapsConfig();
        });

        // ── STATE MACHINE ──
        function transitionTo(targetState) {
            [stateLanding, stateAuditing, stateResults].forEach(s => {
                s.classList.remove('active-state');
                s.classList.add('hidden-state');
            });

            // Small delay for cross-fade
            requestAnimationFrame(() => {
                targetState.classList.remove('hidden-state');
                targetState.classList.add('active-state');
            });
        }

        function showMap() {
            mapBg.classList.add('visible');
            mapOverlay.classList.remove('hidden');
        }

        function hideMap() {
            mapBg.classList.remove('visible');
            mapOverlay.classList.add('hidden');
        }

        function showError(msg) {
            const el = errorMsg;
            el.querySelector('span').textContent = msg;
            el.style.opacity = '1';
            searchPill.classList.add('error-shake');
            setTimeout(() => {
                searchPill.classList.remove('error-shake');
            }, 500);
            setTimeout(() => {
                el.style.opacity = '0';
            }, 4000);
        }

        // ── MAIN AUDIT FUNCTION ──
        async function startAudit() {
            const query = searchInput.value.trim();

            if (!query) {
                showError('Please enter a location to audit');
                searchInput.focus();
                return;
            }

            // Transition to loading state
            transitionTo(stateAuditing);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: query })
                });

                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const data = await response.json();

                if (data.status !== 'success' || !Array.isArray(data.evaluations) || data.evaluations.length === 0) {
                    throw new Error('Invalid response format or no route data received');
                }

                // Minimum loader time for UX polish
                await new Promise(resolve => setTimeout(resolve, 1800));

                renderResults(data.evaluations, query);

            } catch (err) {
                console.error('Audit failed:', err);
                
                await new Promise(resolve => setTimeout(resolve, 800));
                transitionTo(stateLanding);

                setTimeout(() => {
                    showError('Connection failed — ensure the backend is running');
                }, 400);
            }
        }

        // ── RENDER RESULTS ──
        function renderResults(routes, query) {
            // Update query display
            queryDisplay.textContent = query;
            
            // Try to show map (optional feature)
            try {
                if (window.google && window.google.maps) {
                    initMap();
                    setTimeout(() => displayLocationOnMap(query), 200);
                }
            } catch (err) {
                console.log('Maps feature skipped');
            }
            
            // Update meta
            resultsMeta.textContent = `${routes.length} route${routes.length !== 1 ? 's' : ''} analyzed`;

            // Calculate summary
            const safeCount = routes.filter(r => r.is_recommended).length;
            const totalCount = routes.length;
            const safePercent = Math.round((safeCount / totalCount) * 100);

            summaryText.textContent = `${safeCount} of ${totalCount} routes are recommended as safe. Safety score: ${safePercent}%`;

            // Safety score ring
            const circumference = 2 * Math.PI * 28;
            const dashOffset = circumference - (safePercent / 100) * circumference;
            const scoreColor = safePercent >= 60 ? '#72A08A' : '#C17B5C';

            safetyScore.innerHTML = `
                <div class="relative w-16 h-16">
                    <svg class="w-16 h-16 -rotate-90" viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(47,26,10,0.06)" stroke-width="3"/>
                        <circle cx="32" cy="32" r="28" fill="none" stroke="${scoreColor}" stroke-width="3"
                            stroke-dasharray="${circumference}" 
                            stroke-dashoffset="${dashOffset}"
                            stroke-linecap="round"
                            style="transition: stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="font-body text-sm font-semibold" style="color: ${scoreColor}">${safePercent}%</span>
                    </div>
                </div>
            `;

            // Build cards
            resultsGrid.innerHTML = '';

            routes.forEach((route, index) => {
                const isSafe = route.is_recommended;
                const card = document.createElement('div');
                const staggerClass = `stagger-${Math.min(index + 1, 8)}`;

                card.className = `result-card glass-strong rounded-3xl p-7 cursor-default ${staggerClass}`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-5">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full ${isSafe ? 'indicator-safe' : 'indicator-warning'}"></div>
                            <span class="font-body text-xs font-semibold tracking-wider uppercase text-deep-brown/40">${escapeHtml(route.route_id)}</span>
                        </div>
                        <span class="font-body text-xs font-medium tracking-wide px-3 py-1.5 rounded-full ${isSafe ? 'tag-safe' : 'tag-warning'}">
                            ${escapeHtml(route.tag)}
                        </span>
                    </div>
                    <p class="font-body text-sm text-deep-brown/60 leading-relaxed font-light mb-5">
                        ${escapeHtml(route.reason)}
                    </p>
                    <div class="flex items-center gap-2 pt-3 border-t border-deep-brown/[0.06]">
                        ${isSafe 
                            ? `<svg class="w-4 h-4 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                </svg>
                                <span class="font-body text-xs font-medium text-sage">Recommended</span>`
                            : `<svg class="w-4 h-4 text-terracotta" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                                </svg>
                                <span class="font-body text-xs font-medium text-terracotta">Caution advised</span>`
                        }
                    </div>
                `;

                resultsGrid.appendChild(card);
            });

            // Show map background
            showMap();

            // Transition to results
            transitionTo(stateResults);

            // Stagger card animations
            setTimeout(() => {
                const cards = resultsGrid.querySelectorAll('.result-card');
                cards.forEach((card, i) => {
                    setTimeout(() => {
                        card.classList.add('visible');
                    }, i * 80);
                });
            }, 400);
        }

        // ── RESET ──
        function resetToLanding() {
            hideMap();
            transitionTo(stateLanding);
            searchInput.value = '';
            searchInput.focus();
            resultsGrid.innerHTML = '';
        }

        // ── UTIL ──
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // Focus input on load
        window.addEventListener('load', () => {
            setTimeout(() => searchInput.focus(), 300);
        });

        // ── INTERACTIVE CURSOR ──
        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
